name: pr-governance

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate governance policy
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          author=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login')
          head_sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')

          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            echo "Draft PR: governance check is informational until the PR is marked ready."
            exit 0
          fi

          if [ "$author" = "costa92" ]; then
            echo "Owner-authored PR: governance check passes without extra review."
            exit 0
          fi

          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
            -f 'reviewers[]=costa92' || true

          review_json=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews")
          latest_state=$(printf '%s' "$review_json" | python3 -c '
          import json, sys
          reviews = [r for r in json.load(sys.stdin) if r.get("user", {}).get("login") == "costa92" and r.get("state") != "COMMENTED"]
          print(reviews[-1]["state"] if reviews else "")
          ')
          latest_commit=$(printf '%s' "$review_json" | python3 -c '
          import json, sys
          reviews = [r for r in json.load(sys.stdin) if r.get("user", {}).get("login") == "costa92" and r.get("state") != "COMMENTED"]
          print(reviews[-1].get("commit_id", "") if reviews else "")
          ')

          if [ "$latest_state" = "APPROVED" ] && [ "$latest_commit" = "$head_sha" ]; then
            echo "Approved by costa92 on current head: $head_sha"
            exit 0
          fi

          echo "::error::PR requires a current-head approval from costa92 before merge."
          echo "Latest costa92 review state: ${latest_state:-none}"
          echo "Latest costa92 review commit: ${latest_commit:-none}"
          echo "Current head: $head_sha"
          exit 1

  auto-merge-owner:
    needs: governance
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for owner PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          author=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login')
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            echo "Draft PR: skip auto-merge."
            exit 0
          fi
          if [ "$author" != "costa92" ]; then
            echo "Non-owner PR: governance may pass after review, but merge remains manual."
            exit 0
          fi
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --merge \
            --delete-branch
