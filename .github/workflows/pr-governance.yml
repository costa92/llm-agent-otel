name: pr-governance

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-owner-review:
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.user.login != 'costa92' }}
    runs-on: ubuntu-latest
    steps:
      - name: Request costa92 review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
            -f 'reviewers[]=costa92' || true

  auto-approve-owner-pr:
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.user.login == 'costa92' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check automation token
        id: token
        env:
          PR_AUTOMATION_TOKEN: ${{ secrets.PR_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$PR_AUTOMATION_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "PR_AUTOMATION_TOKEN is not configured, so owner-authored PRs cannot be auto-approved yet." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Approve owner-authored PR
        if: ${{ steps.token.outputs.present == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PR_AUTOMATION_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr review "$PR_NUMBER" \
            --repo "$REPO" \
            --approve \
            --body "Auto-approving owner-authored PR."

      - name: Enable auto-merge
        if: ${{ steps.token.outputs.present == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PR_AUTOMATION_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --merge \
            --delete-branch
