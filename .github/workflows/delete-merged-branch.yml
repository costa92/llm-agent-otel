name: delete-merged-branch

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write

concurrency:
  group: delete-merged-branch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  delete-merged-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged head branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const repository = context.payload.repository;
            const sameRepo = pr.head.repo && pr.head.repo.full_name === repository.full_name;

            if (!sameRepo) {
              core.info(`Skip deleting fork branch ${pr.head.label}`);
              return;
            }

            if (pr.head.ref === repository.default_branch) {
              core.info(`Skip deleting default branch ${pr.head.ref}`);
              return;
            }

            const ref = `heads/${pr.head.ref}`;

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info(`Branch ${pr.head.ref} already deleted`);
                return;
              }
              throw error;
            }

            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
            });

            core.info(`Deleted merged branch ${pr.head.ref}`);
